<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Covid-19 Data Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      /* Common styles for all charts */
      body {
        background-color: #ADD8E6; /* Soothing light blue */
        font-family: 'Times New Roman', Times, serif, sans-serif;
        color: #333;
      }
      svg {
        width: 500px;
        height: 500px;
        display: none; /* Hide all charts by default */
        margin: auto;
      }
      /* Style to display the active chart */
      .active {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Covid-19 Data Visualization</h1>

    <!-- Buttons to switch charts -->
    <div style="text-align: center; margin-bottom: 20px;">
      <button onclick="showChart('piechart')">Show Pie Chart</button>
      <button onclick="showChart('barchart')">Show Bar Chart</button>
      <button onclick="showChart('heatmap')">Show Heatmap</button>
    </div>

    <!-- Chart containers -->
    <svg id="barchart"></svg>
    <svg id="heatmap"></svg>
    <svg id="piechart"></svg>

    <!-- Chart scripts -->
    <script src="script-barchart.js"></script>
    <script src="script-heatMap.js"></script>
    <script src="script-pieChart.js"></script>

    <!-- JavaScript to handle button clicks -->
    <script>
      function showChart(chartId) {
        // Hide all charts
        document.querySelectorAll("svg").forEach(chart => {
          chart.classList.remove("active");
        });

        // Show the selected chart
        document.getElementById(chartId).classList.add("active");
      }

      // Initialize by showing the pie chart
      showChart('piechart');
    </script>
  </body>
</html>
